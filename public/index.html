    <section class="login-screen hidden" id="loginScreen"></section>
    <div class="app auth-hidden" id="appShell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark" id="brandMark">PS</div>
          <div>
            <strong id="brandName">The Pool Shed</strong>
            <span id="brandSubtitle">Sales, stock, vans and POs</span>
          </div>
        </div>
        <nav class="nav" id="nav"></nav>
        <div class="side-card">
          <strong>Stock rule</strong>
          <p>Every item must have a location, value, status and movement history.</p>
        </div>

      <main class="main">
        <div class="topbar">
          <div class="title">
            <div class="breadcrumb"><span>⌂</span><span>Dashboard</span><span>›</span><span id="breadcrumbCurrent">Dashboard</span></div>
            <h1 id="pageTitle">Dashboard</h1>
            <p id="pageIntro">A clear live view of sales, stock, vans, purchasing, fulfilment and anything that needs action today.</p>
            <div id="pageBackRow" class="page-back-row"></div>
          </div>
          <div class="top-actions">
            <div class="search">
              <input id="globalSearch" type="search" placeholder="Search sales orders, POs, products, customers, suppliers or barcodes">
              
              <div id="globalSearchResults" class="global-results hidden"></div>
            </div>
            <div class="top-utility-row">
              <button class="notification-button" id="notificationButton" type="button" title="Admin notifications">🔔<span class="notification-badge" id="notificationBadge">0</span></button>
              <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle dark mode" title="Toggle dark mode">☾</button>
              <button class="icon-button" type="button" data-workspace-refresh="Dashboard" title="Refresh">↻</button>
              <div class="account-menu">
                <button class="user-chip user-chip-button" id="userMenuButton" type="button" aria-haspopup="true" aria-expanded="false">
                  <span class="user-avatar" id="topUserAvatar">AB</span>
                  <span id="topUserName">Aaron Boyer</span>
                  <span class="account-chevron">▾</span>
                </button>
                <div class="account-dropdown hidden" id="userMenuDropdown"></div>
              </div>
            </div>
          </div>
        </div>

        <section id="screen-dashboard" class="screen grid"></section>
        <section id="screen-locations" class="screen grid hidden"></section>
        <section id="screen-products" class="screen grid hidden"></section>
        <section id="screen-purchase" class="screen grid hidden"></section>
        <section id="screen-salesorders" class="screen grid hidden"></section>
        <section id="screen-jobs" class="screen grid hidden"></section>
        <section id="screen-engineer" class="screen grid hidden"></section>
        <section id="screen-warehouse" class="screen grid hidden"></section>
        <section id="screen-fulfilment" class="screen grid hidden"></section>
        <section id="screen-crm" class="screen grid hidden"></section>
        <section id="screen-automation" class="screen grid hidden"></section>
        <section id="screen-analytics" class="screen grid hidden"></section>
        <section id="screen-accounting" class="screen grid hidden"></section>
        <section id="screen-settings" class="screen grid hidden"></section>
        <section id="screen-barcodes" class="screen grid hidden"></section>
      </main>
